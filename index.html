<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FinFlow Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c27;
    --border: rgba(255,255,255,0.07);
    --accent: #7c6af7;
    --accent2: #f76a8b;
    --accent3: #6af7c4;
    --text: #f0f0f8;
    --muted: #6b6b88;
    --green: #4ade80;
    --red: #f87171;
    --yellow: #fbbf24;
  }
  .light {
    --bg: #f4f3ff;
    --surface: #ffffff;
    --surface2: #ede9ff;
    --border: rgba(0,0,0,0.08);
    --accent: #6c5ce7;
    --accent2: #e84393;
    --accent3: #00b894;
    --text: #1a1a2e;
    --muted: #8888aa;
    --green: #16a34a;
    --red: #dc2626;
    --yellow: #d97706;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; transition: background 0.3s, color 0.3s; overflow-x: hidden; }
  header { display: flex; align-items: center; justify-content: space-between; padding: 16px 28px; background: var(--surface); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; backdrop-filter: blur(12px); }
  .logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 22px; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: -0.5px; }
  .header-right { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
  .role-toggle { display: flex; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 4px; gap: 4px; }
  .role-btn { padding: 7px 14px; border-radius: 7px; border: none; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; transition: all 0.2s; background: transparent; color: var(--muted); }
  .role-btn.active { background: var(--accent); color: #fff; }
  .theme-btn { width: 38px; height: 38px; border-radius: 10px; border: 1px solid var(--border); background: var(--surface2); color: var(--text); cursor: pointer; font-size: 17px; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
  .theme-btn:hover { background: var(--accent); color: #fff; }
  .export-btn { padding: 7px 14px; border-radius: 9px; border: 1px solid var(--accent); background: transparent; color: var(--accent); font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.2s; }
  .export-btn:hover { background: var(--accent); color: #fff; }
  .layout { display: flex; min-height: calc(100vh - 65px); }
  aside { width: 220px; min-width: 180px; background: var(--surface); border-right: 1px solid var(--border); padding: 24px 14px; display: flex; flex-direction: column; gap: 6px; }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 10px; cursor: pointer; font-size: 14px; font-weight: 500; color: var(--muted); transition: all 0.18s; border: none; background: transparent; width: 100%; text-align: left; }
  .nav-item:hover { background: var(--surface2); color: var(--text); }
  .nav-item.active { background: var(--accent); color: #fff; }
  .nav-icon { font-size: 17px; }
  main { flex: 1; padding: 28px 24px; display: flex; flex-direction: column; gap: 24px; overflow-x: hidden; }
  .section-header { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
  .section-title { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 700; }
  .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(190px, 1fr)); gap: 16px; }
  .kpi-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 20px; position: relative; overflow: hidden; transition: transform 0.2s; }
  .kpi-card:hover { transform: translateY(-2px); }
  .kpi-card::before { content: ''; position: absolute; inset: 0; opacity: 0.04; background: var(--kpi-color, var(--accent)); }
  .kpi-label { font-size: 12px; color: var(--muted); font-weight: 500; letter-spacing: 0.04em; text-transform: uppercase; }
  .kpi-value { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 800; margin: 6px 0; }
  .kpi-badge { display: inline-block; font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 20px; background: rgba(74,222,128,0.15); color: var(--green); }
  .kpi-badge.neg { background: rgba(248,113,113,0.15); color: var(--red); }
  .kpi-icon { position: absolute; right: 16px; top: 16px; font-size: 28px; opacity: 0.18; }
  .filters { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  .filter-select { background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 8px 12px; border-radius: 9px; font-family: 'DM Sans', sans-serif; font-size: 13px; cursor: pointer; outline: none; transition: border 0.2s; }
  .filter-select:focus { border-color: var(--accent); }
  .search-input { background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 8px 14px; border-radius: 9px; font-family: 'DM Sans', sans-serif; font-size: 13px; outline: none; transition: border 0.2s; width: 200px; }
  .search-input:focus { border-color: var(--accent); }
  .chart-row { display: grid; grid-template-columns: 1.6fr 1fr; gap: 16px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 20px; }
  .card-title { font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700; margin-bottom: 16px; color: var(--muted); letter-spacing: 0.04em; text-transform: uppercase; }
  .bar-chart { display: flex; align-items: flex-end; gap: 8px; height: 140px; }
  .bar-group { display: flex; flex-direction: column; align-items: center; flex: 1; gap: 4px; }
  .bar-wrap { display: flex; gap: 3px; align-items: flex-end; height: 120px; }
  .bar { border-radius: 5px 5px 0 0; transition: height 0.6s cubic-bezier(.4,0,.2,1), opacity 0.2s; cursor: pointer; min-width: 10px; }
  .bar:hover { opacity: 0.8; }
  .bar-label { font-size: 10px; color: var(--muted); font-family: 'DM Mono', monospace; }
  .donut-wrap { display: flex; flex-direction: column; align-items: center; gap: 14px; }
  .donut-legend { display: flex; flex-direction: column; gap: 6px; width: 100%; }
  .legend-item { display: flex; align-items: center; gap: 8px; font-size: 12px; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .legend-label { color: var(--muted); flex: 1; }
  .legend-val { font-family: 'DM Mono', monospace; font-weight: 500; font-size: 12px; }
  .table-wrap { overflow-x: auto; border-radius: 12px; border: 1px solid var(--border); }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th { background: var(--surface2); padding: 12px 16px; text-align: left; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); white-space: nowrap; }
  tbody tr { border-top: 1px solid var(--border); transition: background 0.15s; }
  tbody tr:hover { background: var(--surface2); }
  td { padding: 12px 16px; }
  .cat-badge { display: inline-block; padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 600; }
  .amount-pos { color: var(--green); font-family: 'DM Mono', monospace; font-weight: 500; }
  .amount-neg { color: var(--red); font-family: 'DM Mono', monospace; font-weight: 500; }
  .action-btn { padding: 4px 10px; border-radius: 7px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-size: 12px; cursor: pointer; transition: all 0.15s; margin-right: 4px; }
  .action-btn:hover { border-color: var(--accent); color: var(--accent); }
  .action-btn.del:hover { border-color: var(--red); color: var(--red); }
  .insights-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 14px; }
  .insight-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 18px; display: flex; flex-direction: column; gap: 8px; }
  .insight-icon { font-size: 24px; }
  .insight-label { font-size: 12px; color: var(--muted); font-weight: 500; text-transform: uppercase; letter-spacing: 0.04em; }
  .insight-value { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700; }
  .insight-sub { font-size: 12px; color: var(--muted); }
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 20px; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 18px; padding: 28px; width: 100%; max-width: 440px; transform: translateY(20px); transition: transform 0.2s; }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal-title { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700; margin-bottom: 20px; }
  .form-row { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
  .form-label { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; }
  .form-input { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 10px 14px; border-radius: 9px; font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none; transition: border 0.2s; }
  .form-input:focus { border-color: var(--accent); }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
  .btn-primary { padding: 9px 20px; background: var(--accent); color: #fff; border: none; border-radius: 9px; font-family: 'DM Sans', sans-serif; font-weight: 600; font-size: 14px; cursor: pointer; transition: opacity 0.2s; }
  .btn-primary:hover { opacity: 0.85; }
  .btn-ghost { padding: 9px 20px; background: transparent; color: var(--muted); border: 1px solid var(--border); border-radius: 9px; font-family: 'DM Sans', sans-serif; font-weight: 500; font-size: 14px; cursor: pointer; }
  .add-btn { padding: 9px 18px; background: var(--accent); color: #fff; border: none; border-radius: 10px; font-family: 'DM Sans', sans-serif; font-weight: 600; font-size: 13px; cursor: pointer; transition: opacity 0.2s; }
  .add-btn:hover { opacity: 0.85; }
  .empty-state { text-align: center; padding: 48px; color: var(--muted); }
  .empty-state .empty-icon { font-size: 48px; margin-bottom: 12px; }
  .toast { position: fixed; bottom: 24px; right: 24px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px 20px; font-size: 14px; font-weight: 500; z-index: 999; box-shadow: 0 8px 32px rgba(0,0,0,0.3); transform: translateY(80px); transition: transform 0.3s; display: flex; align-items: center; gap: 10px; }
  .toast.show { transform: translateY(0); }
  .role-badge { font-size: 11px; font-weight: 700; padding: 3px 9px; border-radius: 20px; background: rgba(124,106,247,0.15); color: var(--accent); text-transform: uppercase; letter-spacing: 0.08em; }
  .page { display: none; }
  .page.active { display: flex; flex-direction: column; gap: 24px; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  .kpi-card, .card, .insight-card { animation: fadeUp 0.4s ease both; }
  .kpi-card:nth-child(1) { animation-delay: 0.05s; }
  .kpi-card:nth-child(2) { animation-delay: 0.1s; }
  .kpi-card:nth-child(3) { animation-delay: 0.15s; }
  .kpi-card:nth-child(4) { animation-delay: 0.2s; }
  @media (max-width: 900px) { .chart-row { grid-template-columns: 1fr; } aside { display: none; } }
  @media (max-width: 600px) { main { padding: 16px 14px; } .kpi-grid { grid-template-columns: 1fr 1fr; } .search-input { width: 130px; } }
</style>
</head>
<body>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-title" id="modal-title">Add Transaction</div>
    <div class="form-row">
      <label class="form-label">Description</label>
      <input class="form-input" id="f-desc" placeholder="e.g. Grocery shopping" />
    </div>
    <div class="form-row">
      <label class="form-label">Amount (₹)</label>
      <input class="form-input" id="f-amount" type="number" placeholder="e.g. 2500" />
    </div>
    <div style="display:flex;gap:12px;">
      <div class="form-row" style="flex:1">
        <label class="form-label">Category</label>
        <select class="form-input" id="f-cat">
          <option>Food</option><option>Transport</option><option>Shopping</option>
          <option>Entertainment</option><option>Bills</option><option>Healthcare</option><option>Income</option><option>Other</option>
        </select>
      </div>
      <div class="form-row" style="flex:1">
        <label class="form-label">Type</label>
        <select class="form-input" id="f-type">
          <option value="expense">Expense</option>
          <option value="income">Income</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <label class="form-label">Date</label>
      <input class="form-input" id="f-date" type="date" />
    </div>
    <div class="modal-actions">
      <button class="btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn-primary" onclick="saveTransaction()">Save</button>
    </div>
  </div>
</div>

<div class="toast" id="toast">✅ Saved!</div>

<header>
  <div class="logo">FinFlow</div>
  <div class="header-right">
    <span id="role-badge" class="role-badge">Admin</span>
    <div class="role-toggle">
      <button class="role-btn active" onclick="setRole('admin',this)">Admin</button>
      <button class="role-btn" onclick="setRole('viewer',this)">Viewer</button>
    </div>
    <button class="export-btn" onclick="showExportMenu()">⬇ Export</button>
    <button class="theme-btn" onclick="toggleTheme()" id="theme-btn">🌙</button>
  </div>
</header>

<div class="layout">
  <aside>
    <button class="nav-item active" onclick="showPage('dashboard',this)"><span class="nav-icon">📊</span>Dashboard</button>
    <button class="nav-item" onclick="showPage('transactions',this)"><span class="nav-icon">💳</span>Transactions</button>
    <button class="nav-item" onclick="showPage('insights',this)"><span class="nav-icon">💡</span>Insights</button>
  </aside>

  <main id="main-area">
    <div class="page active" id="page-dashboard">
      <div class="section-header">
        <div class="section-title">Overview</div>
        <div class="filters">
          <select class="filter-select" id="dash-month" onchange="renderAll()">
            <option value="all">All Time</option>
            <option value="0">Jan</option><option value="1">Feb</option><option value="2">Mar</option>
            <option value="3">Apr</option><option value="4">May</option><option value="5">Jun</option>
            <option value="6">Jul</option><option value="7">Aug</option><option value="8">Sep</option>
            <option value="9">Oct</option><option value="10">Nov</option><option value="11">Dec</option>
          </select>
        </div>
      </div>
      <div class="kpi-grid" id="kpi-grid"></div>
      <div class="chart-row">
        <div class="card">
          <div class="card-title">Monthly Income vs Expenses</div>
          <div class="bar-chart" id="bar-chart"></div>
        </div>
        <div class="card">
          <div class="card-title">Spending by Category</div>
          <div class="donut-wrap">
            <svg id="donut-svg" width="120" height="120" viewBox="0 0 120 120"></svg>
            <div class="donut-legend" id="donut-legend"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="page" id="page-transactions">
      <div class="section-header">
        <div class="section-title">Transactions</div>
        <button class="add-btn" id="add-btn" onclick="openModal()">+ Add Transaction</button>
      </div>
      <div class="filters">
        <input class="search-input" id="search" placeholder="🔍 Search..." oninput="renderTransactions()" />
        <select class="filter-select" id="filter-cat" onchange="renderTransactions()">
          <option value="all">All Categories</option>
          <option>Food</option><option>Transport</option><option>Shopping</option>
          <option>Entertainment</option><option>Bills</option><option>Healthcare</option><option>Income</option><option>Other</option>
        </select>
        <select class="filter-select" id="filter-type" onchange="renderTransactions()">
          <option value="all">All Types</option>
          <option value="income">Income</option>
          <option value="expense">Expense</option>
        </select>
        <select class="filter-select" id="filter-month" onchange="renderTransactions()">
          <option value="all">All Months</option>
          <option value="0">Jan</option><option value="1">Feb</option><option value="2">Mar</option>
          <option value="3">Apr</option><option value="4">May</option><option value="5">Jun</option>
          <option value="6">Jul</option><option value="7">Aug</option><option value="8">Sep</option>
          <option value="9">Oct</option><option value="10">Nov</option><option value="11">Dec</option>
        </select>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Date</th><th>Description</th><th>Category</th><th>Type</th><th>Amount</th><th id="actions-col">Actions</th>
            </tr>
          </thead>
          <tbody id="tx-body"></tbody>
        </table>
      </div>
    </div>

    <div class="page" id="page-insights">
      <div class="section-title">Insights</div>
      <div class="insights-grid" id="insights-grid"></div>
      <div class="chart-row" style="margin-top:0">
        <div class="card">
          <div class="card-title">Spending Trend (Last 6 Months)</div>
          <div id="trend-chart" style="display:flex;align-items:flex-end;gap:8px;height:120px;"></div>
        </div>
        <div class="card">
          <div class="card-title">Category Breakdown</div>
          <div id="cat-breakdown" style="display:flex;flex-direction:column;gap:8px;"></div>
        </div>
      </div>
    </div>
  </main>
</div>

<script>
const CAT_COLORS = {
  Food:'#7c6af7', Transport:'#f76a8b', Shopping:'#6af7c4',
  Entertainment:'#fbbf24', Bills:'#60a5fa', Healthcare:'#f97316',
  Income:'#4ade80', Other:'#a78bfa'
};

const SEED = [
  {id:1,desc:'Salary',cat:'Income',type:'income',amount:80000,date:'2025-01-05'},
  {id:2,desc:'Electricity Bill',cat:'Bills',type:'expense',amount:3200,date:'2025-01-07'},
  {id:3,desc:'Groceries - DMart',cat:'Food',type:'expense',amount:4500,date:'2025-01-10'},
  {id:4,desc:'Uber rides',cat:'Transport',type:'expense',amount:1200,date:'2025-01-14'},
  {id:5,desc:'Netflix + Prime',cat:'Entertainment',type:'expense',amount:1500,date:'2025-01-18'},
  {id:6,desc:'Salary',cat:'Income',type:'income',amount:80000,date:'2025-02-05'},
  {id:7,desc:'Amazon Shopping',cat:'Shopping',type:'expense',amount:8900,date:'2025-02-09'},
  {id:8,desc:'Doctor Visit',cat:'Healthcare',type:'expense',amount:2200,date:'2025-02-14'},
  {id:9,desc:'Food Delivery',cat:'Food',type:'expense',amount:3100,date:'2025-02-20'},
  {id:10,desc:'Salary',cat:'Income',type:'income',amount:80000,date:'2025-03-05'},
  {id:11,desc:'Rent',cat:'Bills',type:'expense',amount:22000,date:'2025-03-01'},
  {id:12,desc:'Gym Membership',cat:'Healthcare',type:'expense',amount:3000,date:'2025-03-08'},
  {id:13,desc:'Weekend trip',cat:'Entertainment',type:'expense',amount:12000,date:'2025-03-15'},
  {id:14,desc:'Salary',cat:'Income',type:'income',amount:85000,date:'2025-04-05'},
  {id:15,desc:'Phone bill',cat:'Bills',type:'expense',amount:800,date:'2025-04-07'},
  {id:16,desc:'Zomato',cat:'Food',type:'expense',amount:2400,date:'2025-04-12'},
  {id:17,desc:'Metro pass',cat:'Transport',type:'expense',amount:500,date:'2025-04-18'},
  {id:18,desc:'Bonus',cat:'Income',type:'income',amount:20000,date:'2025-04-25'},
];

let state = {
  transactions: JSON.parse(localStorage.getItem('ff_tx') || 'null') || SEED,
  role: 'admin',
  dark: true,
  editId: null,
  nextId: 100,
};

function save() { localStorage.setItem('ff_tx', JSON.stringify(state.transactions)); }

function setRole(role, btn) {
  state.role = role;
  document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('role-badge').textContent = role.charAt(0).toUpperCase() + role.slice(1);
  document.getElementById('add-btn').style.display = role === 'admin' ? '' : 'none';
  document.getElementById('actions-col').style.display = role === 'admin' ? '' : 'none';
  document.querySelectorAll('.admin-action').forEach(el => el.style.display = role === 'admin' ? '' : 'none');
  renderAll();
}

function toggleTheme() {
  state.dark = !state.dark;
  document.body.classList.toggle('light', !state.dark);
  document.getElementById('theme-btn').textContent = state.dark ? '🌙' : '☀️';
}

function showPage(id, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');
  btn.classList.add('active');
  renderAll();
}

function getFiltered() {
  const search = (document.getElementById('search') || {}).value?.toLowerCase() || '';
  const cat = (document.getElementById('filter-cat') || {}).value || 'all';
  const type = (document.getElementById('filter-type') || {}).value || 'all';
  const month = (document.getElementById('filter-month') || {}).value || 'all';
  return state.transactions.filter(t => {
    const d = new Date(t.date);
    return (!search || t.desc.toLowerCase().includes(search) || t.cat.toLowerCase().includes(search))
      && (cat === 'all' || t.cat === cat)
      && (type === 'all' || t.type === type)
      && (month === 'all' || d.getMonth() === +month);
  });
}

function getDashFiltered() {
  const month = (document.getElementById('dash-month') || {}).value || 'all';
  return state.transactions.filter(t => {
    const d = new Date(t.date);
    return month === 'all' || d.getMonth() === +month;
  });
}

function renderAll() {
  renderKPIs();
  renderBarChart();
  renderDonut();
  renderTransactions();
  renderInsights();
}

function fmt(n) { return '₹' + Math.abs(n).toLocaleString('en-IN'); }

function renderKPIs() {
  const data = getDashFiltered();
  const income = data.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0);
  const expense = data.filter(t => t.type === 'expense').reduce((s, t) => s + t.amount, 0);
  const balance = income - expense;
  const txCount = data.length;
  document.getElementById('kpi-grid').innerHTML = `
    <div class="kpi-card" style="--kpi-color:var(--green)">
      <span class="kpi-icon">💰</span>
      <div class="kpi-label">Total Balance</div>
      <div class="kpi-value" style="color:${balance >= 0 ? 'var(--green)' : 'var(--red)'}">${fmt(balance)}</div>
      <span class="kpi-badge ${balance < 0 ? 'neg' : ''}">${balance >= 0 ? '▲ Positive' : '▼ Deficit'}</span>
    </div>
    <div class="kpi-card" style="--kpi-color:var(--accent3)">
      <span class="kpi-icon">📈</span>
      <div class="kpi-label">Total Income</div>
      <div class="kpi-value">${fmt(income)}</div>
      <span class="kpi-badge">${data.filter(t => t.type === 'income').length} entries</span>
    </div>
    <div class="kpi-card" style="--kpi-color:var(--red)">
      <span class="kpi-icon">📉</span>
      <div class="kpi-label">Total Expenses</div>
      <div class="kpi-value" style="color:var(--red)">${fmt(expense)}</div>
      <span class="kpi-badge neg">${data.filter(t => t.type === 'expense').length} entries</span>
    </div>
    <div class="kpi-card" style="--kpi-color:var(--yellow)">
      <span class="kpi-icon">🧾</span>
      <div class="kpi-label">Transactions</div>
      <div class="kpi-value">${txCount}</div>
      <span class="kpi-badge" style="background:rgba(251,191,36,0.15);color:var(--yellow)">Total records</span>
    </div>
  `;
}

function renderBarChart() {
  const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const monthData = {};
  state.transactions.forEach(t => {
    const m = new Date(t.date).getMonth();
    if (!monthData[m]) monthData[m] = { income: 0, expense: 0 };
    monthData[m][t.type] += t.amount;
  });
  const months = Object.keys(monthData).sort((a, b) => a - b).slice(-6);
  if (!months.length) { document.getElementById('bar-chart').innerHTML = '<div class="empty-state"><div class="empty-icon">📊</div>No data</div>'; return; }
  const maxVal = Math.max(...months.map(m => Math.max(monthData[m].income, monthData[m].expense)));
  const container = document.getElementById('bar-chart');
  container.innerHTML = months.map(m => {
    const ih = Math.round((monthData[m].income / maxVal) * 110) || 2;
    const eh = Math.round((monthData[m].expense / maxVal) * 110) || 2;
    return `<div class="bar-group">
      <div class="bar-wrap">
        <div class="bar" style="height:${ih}px;background:var(--accent3);width:14px" title="Income: ${fmt(monthData[m].income)}"></div>
        <div class="bar" style="height:${eh}px;background:var(--accent2);width:14px" title="Expense: ${fmt(monthData[m].expense)}"></div>
      </div>
      <div class="bar-label">${MONTHS[m]}</div>
    </div>`;
  }).join('');
  container.innerHTML += `<div style="display:flex;flex-direction:column;gap:6px;margin-left:auto;font-size:11px;color:var(--muted);align-self:flex-end;padding-bottom:18px;">
    <div style="display:flex;align-items:center;gap:6px;"><span style="width:10px;height:10px;background:var(--accent3);border-radius:2px;display:inline-block"></span>Income</div>
    <div style="display:flex;align-items:center;gap:6px;"><span style="width:10px;height:10px;background:var(--accent2);border-radius:2px;display:inline-block"></span>Expense</div>
  </div>`;
}

function renderDonut() {
  const data = getDashFiltered().filter(t => t.type === 'expense');
  const catTotals = {};
  data.forEach(t => { catTotals[t.cat] = (catTotals[t.cat] || 0) + t.amount; });
  const entries = Object.entries(catTotals).sort((a, b) => b[1] - a[1]).slice(0, 6);
  const total = entries.reduce((s, [, v]) => s + v, 0);
  if (!total) { document.getElementById('donut-svg').innerHTML = ''; document.getElementById('donut-legend').innerHTML = '<div style="color:var(--muted);font-size:12px">No expense data</div>'; return; }
  const svg = document.getElementById('donut-svg');
  const cx = 60, cy = 60, r = 45, ri = 28;
  let startAngle = -Math.PI / 2;
  let paths = '';
  entries.forEach(([cat, val]) => {
    const angle = (val / total) * 2 * Math.PI;
    const x1 = cx + r * Math.cos(startAngle), y1 = cy + r * Math.sin(startAngle);
    const x2 = cx + r * Math.cos(startAngle + angle), y2 = cy + r * Math.sin(startAngle + angle);
    const ix1 = cx + ri * Math.cos(startAngle), iy1 = cy + ri * Math.sin(startAngle);
    const ix2 = cx + ri * Math.cos(startAngle + angle), iy2 = cy + ri * Math.sin(startAngle + angle);
    const lg = angle > Math.PI ? 1 : 0;
    paths += `<path d="M${x1},${y1} A${r},${r},0,${lg},1,${x2},${y2} L${ix2},${iy2} A${ri},${ri},0,${lg},0,${ix1},${iy1} Z" fill="${CAT_COLORS[cat] || '#888'}" opacity="0.9"><title>${cat}: ${fmt(val)}</title></path>`;
    startAngle += angle;
  });
  svg.innerHTML = paths + `<text x="60" y="58" text-anchor="middle" font-size="9" fill="var(--muted)" font-family="DM Sans">Total</text><text x="60" y="70" text-anchor="middle" font-size="9" fill="var(--text)" font-family="DM Mono" font-weight="600">${fmt(total)}</text>`;
  document.getElementById('donut-legend').innerHTML = entries.map(([cat, val]) => `
    <div class="legend-item">
      <span class="legend-dot" style="background:${CAT_COLORS[cat] || '#888'}"></span>
      <span class="legend-label">${cat}</span>
      <span class="legend-val">${fmt(val)}</span>
    </div>`).join('');
}

function renderTransactions() {
  const data = getFiltered();
  const tbody = document.getElementById('tx-body');
  const isAdmin = state.role === 'admin';
  if (!data.length) { tbody.innerHTML = `<tr><td colspan="6"><div class="empty-state"><div class="empty-icon">💳</div><div>No transactions found</div></div></td></tr>`; return; }
  tbody.innerHTML = data.sort((a, b) => new Date(b.date) - new Date(a.date)).map(t => `
    <tr>
      <td style="font-family:DM Mono;font-size:12px;color:var(--muted)">${t.date}</td>
      <td style="font-weight:500">${t.desc}</td>
      <td><span class="cat-badge" style="background:${CAT_COLORS[t.cat] || '#888'}22;color:${CAT_COLORS[t.cat] || '#888'}">${t.cat}</span></td>
      <td style="font-size:12px;color:var(--muted);text-transform:capitalize">${t.type}</td>
      <td class="${t.type === 'income' ? 'amount-pos' : 'amount-neg'}">${t.type === 'income' ? '+' : '-'}${fmt(t.amount)}</td>
      <td>${isAdmin ? `<button class="action-btn admin-action" onclick="editTx(${t.id})">✏️</button><button class="action-btn del admin-action" onclick="deleteTx(${t.id})">🗑</button>` : '<span style="color:var(--muted);font-size:12px">—</span>'}</td>
    </tr>`).join('');
}

function renderInsights() {
  const txs = state.transactions;
  if (!txs.length) { document.getElementById('insights-grid').innerHTML = '<div class="empty-state"><div class="empty-icon">💡</div><div>No data for insights</div></div>'; return; }
  const expenses = txs.filter(t => t.type === 'expense');
  const catTotals = {};
  expenses.forEach(t => catTotals[t.cat] = (catTotals[t.cat] || 0) + t.amount);
  const topCat = Object.entries(catTotals).sort((a, b) => b[1] - a[1])[0] || ['—', 0];
  const monthTotals = {};
  expenses.forEach(t => { const m = new Date(t.date).getMonth(); monthTotals[m] = (monthTotals[m] || 0) + t.amount; });
  const months = Object.entries(monthTotals).sort((a, b) => +a[0] - +b[0]);
  const lastTwo = months.slice(-2);
  let monthCmp = 'Not enough data';
  if (lastTwo.length === 2) {
    const diff = lastTwo[1][1] - lastTwo[0][1];
    monthCmp = (diff > 0 ? '▲ +' : '▼ ') + fmt(Math.abs(diff)) + ' vs prev month';
  }
  const avgTx = expenses.length ? Math.round(expenses.reduce((s, t) => s + t.amount, 0) / expenses.length) : 0;
  const savingsRate = (() => {
    const inc = txs.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0);
    const exp = expenses.reduce((s, t) => s + t.amount, 0);
    return inc ? Math.round(((inc - exp) / inc) * 100) : 0;
  })();
  document.getElementById('insights-grid').innerHTML = `
    <div class="insight-card">
      <div class="insight-icon">🏆</div>
      <div class="insight-label">Top Spending Category</div>
      <div class="insight-value" style="color:${CAT_COLORS[topCat[0]] || 'var(--accent)'}">${topCat[0]}</div>
      <div class="insight-sub">${fmt(topCat[1])} total spent</div>
    </div>
    <div class="insight-card">
      <div class="insight-icon">📅</div>
      <div class="insight-label">Monthly Comparison</div>
      <div class="insight-value" style="font-size:14px">${monthCmp}</div>
      <div class="insight-sub">Expense trend</div>
    </div>
    <div class="insight-card">
      <div class="insight-icon">💳</div>
      <div class="insight-label">Avg Transaction</div>
      <div class="insight-value">${fmt(avgTx)}</div>
      <div class="insight-sub">Per expense entry</div>
    </div>
    <div class="insight-card">
      <div class="insight-icon">💾</div>
      <div class="insight-label">Savings Rate</div>
      <div class="insight-value" style="color:${savingsRate >= 20 ? 'var(--green)' : savingsRate < 0 ? 'var(--red)' : 'var(--yellow)'}">${savingsRate}%</div>
      <div class="insight-sub">${savingsRate >= 20 ? 'Great job! 🎉' : savingsRate < 0 ? 'Spending exceeds income' : 'Room to improve'}</div>
    </div>
  `;
  const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const last6 = months.slice(-6);
  const maxM = Math.max(...last6.map(m => m[1])) || 1;
  document.getElementById('trend-chart').innerHTML = last6.map(([m, v]) => `
    <div style="display:flex;flex-direction:column;align-items:center;flex:1;gap:4px">
      <div style="height:${Math.round((v / maxM) * 100)}px;background:var(--accent);border-radius:5px 5px 0 0;width:100%;transition:height 0.6s;min-height:4px" title="${fmt(v)}"></div>
      <div style="font-size:10px;color:var(--muted);font-family:DM Mono">${MONTHS[+m]}</div>
    </div>`).join('');
  const sorted = Object.entries(catTotals).sort((a, b) => b[1] - a[1]).slice(0, 5);
  const maxC = sorted[0]?.[1] || 1;
  document.getElementById('cat-breakdown').innerHTML = sorted.map(([cat, val]) => `
    <div style="display:flex;align-items:center;gap:10px;font-size:12px">
      <div style="width:72px;color:var(--muted);text-align:right">${cat}</div>
      <div style="flex:1;height:10px;background:var(--surface2);border-radius:4px;overflow:hidden">
        <div style="width:${Math.round((val / maxC) * 100)}%;height:100%;background:${CAT_COLORS[cat] || 'var(--accent)'};border-radius:4px;transition:width 0.6s"></div>
      </div>
      <div style="width:64px;font-family:DM Mono;font-weight:500">${fmt(val)}</div>
    </div>`).join('');
}

function openModal(tx = null) {
  state.editId = tx ? tx.id : null;
  document.getElementById('modal-title').textContent = tx ? 'Edit Transaction' : 'Add Transaction';
  document.getElementById('f-desc').value = tx?.desc || '';
  document.getElementById('f-amount').value = tx?.amount || '';
  document.getElementById('f-cat').value = tx?.cat || 'Food';
  document.getElementById('f-type').value = tx?.type || 'expense';
  document.getElementById('f-date').value = tx?.date || new Date().toISOString().split('T')[0];
  document.getElementById('modal').classList.add('open');
}

function closeModal() { document.getElementById('modal').classList.remove('open'); }
document.getElementById('modal').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });

function saveTransaction() {
  const desc = document.getElementById('f-desc').value.trim();
  const amount = parseFloat(document.getElementById('f-amount').value);
  const cat = document.getElementById('f-cat').value;
  const type = document.getElementById('f-type').value;
  const date = document.getElementById('f-date').value;
  if (!desc || !amount || !date) { showToast('⚠️ Please fill all fields'); return; }
  if (state.editId) {
    const idx = state.transactions.findIndex(t => t.id === state.editId);
    state.transactions[idx] = { ...state.transactions[idx], desc, amount, cat, type, date };
    showToast('✅ Transaction updated');
  } else {
    state.transactions.push({ id: ++state.nextId, desc, amount, cat, type, date });
    showToast('✅ Transaction added');
  }
  save(); closeModal(); renderAll();
}

function editTx(id) {
  const tx = state.transactions.find(t => t.id === id);
  if (tx) openModal(tx);
}

function deleteTx(id) {
  if (!confirm('Delete this transaction?')) return;
  state.transactions = state.transactions.filter(t => t.id !== id);
  save(); renderAll(); showToast('🗑 Deleted');
}

function showExportMenu() {
  const choice = confirm('Export as CSV? (Cancel = JSON)');
  if (choice) exportCSV(); else exportJSON();
}

function exportCSV() {
  const rows = [['Date', 'Description', 'Category', 'Type', 'Amount'], ...state.transactions.map(t => [t.date, t.desc, t.cat, t.type, t.amount])];
  const csv = rows.map(r => r.join(',')).join('\n');
  download('finflow_transactions.csv', 'text/csv', csv);
  showToast('📄 CSV exported!');
}

function exportJSON() {
  download('finflow_transactions.json', 'application/json', JSON.stringify(state.transactions, null, 2));
  showToast('📄 JSON exported!');
}

function download(name, type, content) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([content], { type }));
  a.download = name; a.click();
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
}

renderAll();
</script>
</body>
</html>
